name: Build and Deploy Lambda Layer

on:
  push:
    branches:
      - diagnostics
  workflow_dispatch:

env:
  JAVA_VERSION: '8'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install Quaqua dependency
        run: |
          set -euo pipefail
          mvn --batch-mode org.apache.maven.plugins:maven-install-plugin:3.1.2:install-file \
            -Dfile="${{ github.workspace }}/formscanner-commons/src/main/resources/lib/quaqua-8.0.jar" \
            -DgroupId=ch.randelshofer \
            -DartifactId=quaqua \
            -Dversion=8.0 \
            -Dpackaging=jar

      - name: Build shaded jar
        run: |
          set -euo pipefail
          mvn --batch-mode -pl formscanner-distribution -am \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -Dgpg.skip=true \
            clean package

      - name: Prepare Lambda layer content
        run: |
          set -euo pipefail
          rm -rf layer
          JAR_PATH=formscanner-main/target/formscanner.jar
          if [ ! -f "$JAR_PATH" ]; then
            echo "Shaded jar not found"
            exit 1
          fi
          mkdir -p layer/java/lib
          cp "$JAR_PATH" layer/java/lib/formscanner.jar

      - name: Package Lambda layer
        run: zip -r formscanner-layer.zip layer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: formscanner-layer
          path: |
            formscanner-layer.zip
            formscanner-main/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Decide whether to deploy
        id: deploy-check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SAM_ARTIFACT_BUCKET: ${{ secrets.SAM_ARTIFACT_BUCKET }}
          SAM_STACK_NAME: ${{ secrets.SAM_STACK_NAME }}
        run: |
          set -euo pipefail
          missing=0
          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION SAM_ARTIFACT_BUCKET SAM_STACK_NAME; do
            if [ -z "${!name:-}" ]; then
              echo "::notice::Skipping deploy because $name is not set"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.deploy-check.outputs.should_deploy == 'true'
        uses: actions/checkout@v4

      - name: Download layer artifact
        if: steps.deploy-check.outputs.should_deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: formscanner-layer
          path: artifacts

      - name: Unpack layer content
        if: steps.deploy-check.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail
          rm -rf layer
          unzip artifacts/formscanner-layer.zip

      - name: Set up Temurin JDK
        if: steps.deploy-check.outputs.should_deploy == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up AWS SAM CLI
        if: steps.deploy-check.outputs.should_deploy == 'true'
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        if: steps.deploy-check.outputs.should_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure stack can be updated
        if: steps.deploy-check.outputs.should_deploy == 'true'
        env:
          SAM_STACK_NAME: ${{ secrets.SAM_STACK_NAME }}
        run: |
          set -euo pipefail
          stack_status=$(aws cloudformation describe-stacks --stack-name "$SAM_STACK_NAME" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo 'STACK_DOES_NOT_EXIST')
          if [ "$stack_status" = "ROLLBACK_COMPLETE" ]; then
            echo "::warning::Existing stack $SAM_STACK_NAME is stuck in ROLLBACK_COMPLETE. Deleting before redeploy."
            aws cloudformation delete-stack --stack-name "$SAM_STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$SAM_STACK_NAME"
          elif [ "$stack_status" = "DELETE_FAILED" ]; then
            echo "::error::Stack $SAM_STACK_NAME is in DELETE_FAILED. Manual intervention required before redeploy."
            exit 1
          else
            echo "Stack status for $SAM_STACK_NAME is $stack_status. Proceeding with deploy."
          fi

      - name: Build SAM application
        if: steps.deploy-check.outputs.should_deploy == 'true'
        run: sam build --template-file template.yaml

      - name: Deploy Lambda layer
        if: steps.deploy-check.outputs.should_deploy == 'true'
        env:
          SAM_ARTIFACT_BUCKET: ${{ secrets.SAM_ARTIFACT_BUCKET }}
          SAM_STACK_NAME: ${{ secrets.SAM_STACK_NAME }}
        run: |
          set -euo pipefail
          sam deploy --template-file .aws-sam/build/template.yaml \
            --stack-name "$SAM_STACK_NAME" \
            --s3-bucket "$SAM_ARTIFACT_BUCKET" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Log skipped deploy
        if: steps.deploy-check.outputs.should_deploy != 'true'
        run: echo "Deployment skipped because required secrets are not configured."
