name: Build and Deploy Lambda Layer

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '8'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install Quaqua dependency
        run: mvn --batch-mode install:install-file \
          -Dfile=formscanner-commons/src/main/resources/lib/quaqua-8.0.jar \
          -DgroupId=ch.randelshofer \
          -DartifactId=quaqua \
          -Dversion=8.0 \
          -Dpackaging=jar

      - name: Build shaded jar
        run: mvn --batch-mode -pl formscanner-distribution -am \
          -DskipTests \
          -Dmaven.javadoc.skip=true \
          -Dgpg.skip=true \
          clean package

      - name: Prepare Lambda layer content
        run: |
          set -euo pipefail
          rm -rf layer
          JAR_PATH=$(find formscanner-main/target -maxdepth 1 -type f -name 'formscanner-main-*-all.jar' -print -quit)
          if [ -z "$JAR_PATH" ]; then
            echo "Shaded jar not found"
            exit 1
          fi
          mkdir -p layer/java/lib
          cp "$JAR_PATH" layer/java/lib/formscanner-main-all.jar

      - name: Package Lambda layer
        run: zip -r formscanner-layer.zip layer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: formscanner-layer
          path: |
            formscanner-layer.zip
            formscanner-main/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.SAM_ARTIFACT_BUCKET != '' && secrets.SAM_STACK_NAME != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download layer artifact
        uses: actions/download-artifact@v4
        with:
          name: formscanner-layer
          path: artifacts

      - name: Unpack layer content
        run: |
          set -euo pipefail
          rm -rf layer
          unzip artifacts/formscanner-layer.zip

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build SAM application
        run: sam build --template-file template.yaml

      - name: Deploy Lambda layer
        run: |
          sam deploy --template-file .aws-sam/build/template.yaml \
            --stack-name ${{ secrets.SAM_STACK_NAME }} \
            --s3-bucket ${{ secrets.SAM_ARTIFACT_BUCKET }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
