AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Publish the FormScanner jar as an AWS Lambda layer and expose its ARN via SSM.

Resources:
  FormScannerLayer:
    Type: AWS::Serverless::LayerVersion
    Metadata:
      BuildMethod: makefile
    Properties:
      LayerName: formscanner-layer
      Description: FormScanner shaded jar packaged for Lambda runtime use
      ContentUri: .
      CompatibleRuntimes:
        - java8.al2
        - java11
        - java17
        - python3.13
        - provided.al2
        - provided.al2023
      LicenseInfo: MIT

  FormScannerLayerArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /layers/shared/formscanner/arn
      Type: String
      Value: !Ref FormScannerLayer
      Description: ARN for the published FormScanner Lambda layer.

Outputs:
  LayerVersionArn:
    Description: ARN of the published FormScanner Lambda layer.
    Value: !Ref FormScannerLayer
  LayerVersionNumber:
    Description: Version number for the published layer.
    Value: !Select [7, !Split [":", !Ref FormScannerLayer]]
  LayerArnParameterName:
    Description: SSM parameter storing the layer ARN.
    Value: !Ref FormScannerLayerArnParameter
